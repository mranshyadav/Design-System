<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Type pairing in context</title>
<link rel="stylesheet" href="_preview.css">
<style>
  .stage { background: var(--paper); padding: 36px; border: 1px solid var(--border-1); border-radius: 8px; }
  .eyebrow { font-family: var(--font-mono); font-size: 12px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--accent); margin-bottom: 18px; }
  .head { font-family: var(--font-display); font-size: 56px; line-height: 1.02; letter-spacing: -0.02em; color: var(--fg-1); margin: 0; max-width: 760px; }
  .head em { font-style: italic; }
  .body { font-family: var(--font-sans); font-size: 16px; line-height: 1.6; color: var(--fg-2); margin: 18px 0 0; max-width: 540px; }
  .stamp { display: inline-flex; gap: 10px; align-items: center; margin-top: 20px; font-family: var(--font-mono); font-size: 12px; color: var(--fg-3); letter-spacing: 0.04em; }
  .stamp .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--success); }
</style>
</head>
<body class="sr-preview">
  <div class="stage">
    <div class="eyebrow">01 · Foundations</div>
    <h2 class="head">A precision layer for <em>critical</em> systems.</h2>
    <p class="body">Serif display for editorial moments, sans for the interface, mono for anything that has a unit, an ID, or a version.</p>
    <div class="stamp"><span class="dot"></span>SCHEMA · v2.4.1 · TYPED OK</div>
  </div>
</body>
</html>
