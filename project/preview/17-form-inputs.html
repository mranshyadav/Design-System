<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Form inputs</title>
<link rel="stylesheet" href="_preview.css">
<style>
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px 24px; max-width: 640px; }
  .field { display: flex; flex-direction: column; gap: 6px; }
  .label { font-family: var(--font-sans); font-size: 13px; font-weight: 500; color: var(--fg-2); }
  .input {
    font-family: var(--font-sans); font-size: 14px; color: var(--ink);
    background: var(--surface); border: 1px solid var(--border-1);
    border-radius: 4px; padding: 8px 10px; height: 36px;
    width: 100%; box-sizing: border-box;
  }
  .input:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 2px var(--accent-ring); }
  .input--focus { border-color: var(--accent); box-shadow: 0 0 0 2px var(--accent-ring); }
  .input--error { border-color: var(--danger); }
  .input.mono { font-family: var(--font-mono); }
  .hint { font-family: var(--font-mono); font-size: 11px; color: var(--fg-3); }
  .err { font-family: var(--font-sans); font-size: 12px; color: var(--danger); }
  .check { display: inline-flex; align-items: center; gap: 8px; font-size: 13px; color: var(--fg-1); }
  .check .box { width: 14px; height: 14px; border-radius: 3px; border: 1px solid var(--border-2); background: var(--surface); }
  .check.on .box { background: var(--accent); border-color: var(--accent); position: relative; }
  .check.on .box::after { content: ""; position: absolute; left: 4px; top: 1px; width: 4px; height: 8px; border: solid #fff; border-width: 0 2px 2px 0; transform: rotate(45deg); }
</style>
</head>
<body class="sr-preview">
  <div class="grid">
    <div class="field">
      <span class="label">Workspace name</span>
      <input class="input" value="acme-prod" />
      <span class="hint">Lowercase, hyphens only</span>
    </div>
    <div class="field">
      <span class="label">Region</span>
      <input class="input mono" value="us-east-1" />
      <span class="hint">ISO region code</span>
    </div>
    <div class="field">
      <span class="label">API key</span>
      <input class="input mono input--focus" value="sk_live_•••••••• 4f2b" />
      <span class="hint">Focused state</span>
    </div>
    <div class="field">
      <span class="label">Webhook URL</span>
      <input class="input input--error" value="not-a-url" />
      <span class="err">Must be a valid HTTPS URL</span>
    </div>
    <div class="field">
      <span class="check on"><span class="box"></span> Enable schema validation</span>
      <span class="check"><span class="box"></span> Allow breaking changes (off)</span>
    </div>
  </div>
</body>
</html>
