<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Progress bars</title>
<link rel="stylesheet" href="_preview.css">
<style>
  .stack { display: grid; gap: 22px; }
  .row { display: grid; grid-template-columns: 110px 1fr; gap: 16px; align-items: center; }
  .tag { font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--fg-3); }
  .bar { background: var(--graphite-08); height: 8px; border-radius: 9999px; overflow: hidden; position: relative; max-width: 380px; }
  .bar > span { display: block; height: 100%; background: var(--accent); border-radius: 9999px; }
  .bar.sm { height: 4px; }
  .bar.lg { height: 12px; }
  .bar.square { border-radius: 2px; }
  .bar.square > span { border-radius: 2px; }
  .pair { display: flex; align-items: baseline; justify-content: space-between; max-width: 380px; margin-bottom: 6px; }
  .pair .lab { font-size: 13px; color: var(--fg-1); }
  .pair .pct { font-family: var(--font-mono); font-size: 12px; color: var(--fg-3); }
  .stops { display: flex; gap: 4px; max-width: 380px; }
  .stops .seg { flex: 1; height: 8px; background: var(--graphite-08); border-radius: 2px; }
  .stops .seg.on { background: var(--accent); }

  /* Circular */
  .circle { width: 56px; height: 56px; position: relative; }
  .circle svg { transform: rotate(-90deg); }
  .circle .pct { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; font-family: var(--font-mono); font-size: 11px; color: var(--fg-1); }
  .circles { display: flex; gap: 18px; align-items: center; }
  .ok > span { background: #1F6B47; }
  .warn > span { background: #8A5A14; }
  .err > span { background: #9A2222; }
</style>
</head>
<body class="sr-preview">
<div class="stack">
  <div>
    <div class="pair"><span class="lab">Uploading payload</span><span class="pct">62%</span></div>
    <div class="bar"><span style="width:62%"></span></div>
  </div>
  <div class="row"><span class="tag">Sizes</span>
    <div style="display:flex; flex-direction:column; gap:8px; max-width:380px">
      <div class="bar sm"><span style="width:35%"></span></div>
      <div class="bar"><span style="width:62%"></span></div>
      <div class="bar lg"><span style="width:88%"></span></div>
    </div>
  </div>
  <div class="row"><span class="tag">Semantic</span>
    <div style="display:flex; flex-direction:column; gap:8px; max-width:380px">
      <div class="bar ok"><span style="width:96%"></span></div>
      <div class="bar warn"><span style="width:72%"></span></div>
      <div class="bar err"><span style="width:24%"></span></div>
    </div>
  </div>
  <div class="row"><span class="tag">Segmented</span>
    <div class="stops">
      <div class="seg on"></div>
      <div class="seg on"></div>
      <div class="seg on"></div>
      <div class="seg on"></div>
      <div class="seg"></div>
      <div class="seg"></div>
    </div>
  </div>
  <div class="row"><span class="tag">Circular</span>
    <div class="circles">
      <div class="circle">
        <svg width="56" height="56" viewBox="0 0 56 56">
          <circle cx="28" cy="28" r="22" fill="none" stroke="var(--graphite-08)" stroke-width="5"/>
          <circle cx="28" cy="28" r="22" fill="none" stroke="var(--accent)" stroke-width="5" stroke-linecap="round" stroke-dasharray="138.2" stroke-dashoffset="55.3"/>
        </svg>
        <span class="pct">60%</span>
      </div>
      <div class="circle">
        <svg width="56" height="56" viewBox="0 0 56 56">
          <circle cx="28" cy="28" r="22" fill="none" stroke="var(--graphite-08)" stroke-width="5"/>
          <circle cx="28" cy="28" r="22" fill="none" stroke="#1F6B47" stroke-width="5" stroke-linecap="round" stroke-dasharray="138.2" stroke-dashoffset="0"/>
        </svg>
        <span class="pct">100%</span>
      </div>
      <div class="circle">
        <svg width="56" height="56" viewBox="0 0 56 56">
          <circle cx="28" cy="28" r="22" fill="none" stroke="var(--graphite-08)" stroke-width="5"/>
          <circle cx="28" cy="28" r="22" fill="none" stroke="var(--accent)" stroke-width="5" stroke-linecap="round" stroke-dasharray="138.2" stroke-dashoffset="138.2;0" >
            <animate attributeName="stroke-dashoffset" from="138.2" to="0" dur="1.2s" repeatCount="indefinite"/>
          </circle>
        </svg>
        <span class="pct">…</span>
      </div>
    </div>
  </div>
</div>
</body>
</html>
