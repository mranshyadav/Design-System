<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Time picker</title>
<link rel="stylesheet" href="_preview.css">
<style>
  .grid { display: grid; grid-template-columns: 280px 1fr; gap: 32px; align-items: flex-start; }
  .tag { font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--fg-3); margin-bottom: 6px; display: block; }
  .input { display: inline-flex; align-items: center; gap: 8px; background: var(--surface); border: 1px solid var(--border-1); border-radius: 4px; padding: 0 10px; height: 36px; font: 14px var(--font-mono); color: var(--fg-1); width: 100%; box-sizing: border-box; }
  .input.focus { border-color: var(--accent); box-shadow: 0 0 0 2px var(--accent-ring); }
  .input .ic { color: var(--fg-3); }
  .seg { display: inline-flex; padding: 2px; background: var(--bg-3); border-radius: 6px; }
  .seg button { background: transparent; border: 0; padding: 6px 12px; font: 500 12px var(--font-sans); color: var(--fg-2); border-radius: 4px; cursor: pointer; }
  .seg button.on { background: var(--surface); color: var(--fg-1); box-shadow: var(--shadow-1); }

  /* Steppers */
  .pop { background: var(--surface); border: 1px solid var(--border-1); border-radius: 8px; box-shadow: var(--shadow-2); padding: 14px; width: 320px; }
  .columns { display: grid; grid-template-columns: 1fr 8px 1fr 1fr; gap: 6px; align-items: stretch; }
  .col { background: var(--bg-3); border-radius: 4px; max-height: 220px; overflow-y: auto; padding: 4px 0; scroll-behavior: smooth; }
  .col::-webkit-scrollbar { width: 4px; } .col::-webkit-scrollbar-thumb { background: var(--graphite-15); }
  .opt { text-align: center; font-family: var(--font-mono); font-size: 13px; color: var(--fg-2); padding: 6px 0; cursor: pointer; }
  .opt:hover { background: var(--surface); color: var(--fg-1); }
  .opt.on { background: var(--accent); color: #fff; border-radius: 2px; margin: 0 4px; }
  .sep { display: flex; align-items: center; justify-content: center; font-family: var(--font-mono); color: var(--fg-3); }
  .footer { display: flex; justify-content: space-between; margin-top: 12px; padding-top: 10px; border-top: 1px solid var(--border-1); align-items: center; }
  .ghost { background: transparent; border: 0; font: 500 12px var(--font-sans); color: var(--fg-2); cursor: pointer; }
  .primary { background: var(--ink); color: var(--paper); border: 0; border-radius: 4px; padding: 6px 12px; font: 500 12px var(--font-sans); cursor: pointer; }
  .preset { display: flex; gap: 6px; flex-wrap: wrap; }
  .chip { font: 500 12px var(--font-sans); background: var(--bg-3); border: 1px solid var(--border-1); color: var(--fg-2); padding: 4px 10px; border-radius: 9999px; cursor: pointer; }
  .chip.on { background: rgba(31,63,224,0.08); color: var(--accent); border-color: rgba(31,63,224,0.3); }
</style>
</head>
<body class="sr-preview">
<div class="grid">
  <div>
    <span class="tag">Inputs</span>
    <div style="display:flex; flex-direction:column; gap:10px">
      <div class="input"><span class="ic"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg></span><span>14:02</span><span style="color:var(--fg-3); margin-left:auto">UTC</span></div>
      <div class="input focus"><span class="ic" style="color:var(--accent)"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg></span><span>02:15 PM</span></div>
      <div style="display:flex; gap:8px; align-items:center">
        <span class="tag" style="margin:0; width:auto">Format</span>
        <div class="seg"><button class="on">24h</button><button>12h</button></div>
      </div>
    </div>
  </div>
  <div>
    <span class="tag">Open · column picker</span>
    <div class="pop">
      <div class="columns">
        <div class="col">
          <div class="opt">12</div><div class="opt">13</div>
          <div class="opt on">14</div>
          <div class="opt">15</div><div class="opt">16</div><div class="opt">17</div><div class="opt">18</div>
        </div>
        <div class="sep">:</div>
        <div class="col">
          <div class="opt">00</div>
          <div class="opt on">02</div>
          <div class="opt">04</div><div class="opt">06</div><div class="opt">08</div><div class="opt">10</div>
        </div>
        <div class="col">
          <div class="opt">UTC</div>
          <div class="opt on">EDT</div>
          <div class="opt">PDT</div><div class="opt">CET</div><div class="opt">JST</div>
        </div>
      </div>
      <div class="preset" style="margin-top:12px">
        <span class="chip">Now</span>
        <span class="chip on">+15 min</span>
        <span class="chip">+1 h</span>
        <span class="chip">Midnight</span>
      </div>
      <div class="footer">
        <span style="font-family:var(--font-mono); font-size:12px; color:var(--fg-3)">14:02 EDT</span>
        <div style="display:flex; gap:6px"><button class="ghost">Cancel</button><button class="primary">Apply</button></div>
      </div>
    </div>
  </div>
</div>
</body>
</html>
