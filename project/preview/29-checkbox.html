<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Checkbox</title>
<link rel="stylesheet" href="_preview.css">
<style>
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 32px; }
  .col { display: flex; flex-direction: column; gap: 10px; }
  .tag { font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--fg-3); margin-bottom: 4px; }
  .c { display: flex; align-items: flex-start; gap: 10px; cursor: pointer; padding: 4px 0; font-size: 14px; color: var(--fg-1); }
  .c .b { width: 16px; height: 16px; border-radius: 3px; border: 1.5px solid var(--border-2); background: var(--surface); margin-top: 2px; flex-shrink: 0; position: relative; }
  .c.on .b { background: var(--accent); border-color: var(--accent); }
  .c.on .b::after { content: ""; position: absolute; left: 4px; top: 0.5px; width: 5px; height: 9px; border: solid #fff; border-width: 0 2px 2px 0; transform: rotate(45deg); }
  .c.mixed .b { background: var(--accent); border-color: var(--accent); }
  .c.mixed .b::after { content: ""; position: absolute; left: 3px; right: 3px; top: 6px; height: 2px; background: #fff; border-radius: 1px; }
  .c.disabled { opacity: 0.45; cursor: not-allowed; }
  .c.error .b { border-color: var(--danger); }
  .c .sub { display: block; font-size: 12px; color: var(--fg-3); margin-top: 2px; }
  /* Toggle (switch) */
  .sw { display: inline-flex; align-items: center; gap: 10px; cursor: pointer; padding: 4px 0; }
  .sw .track { width: 32px; height: 18px; border-radius: 9999px; background: var(--graphite-15); position: relative; transition: background 120ms var(--ease-standard); }
  .sw .knob { position: absolute; top: 2px; left: 2px; width: 14px; height: 14px; border-radius: 50%; background: var(--surface); box-shadow: 0 1px 2px rgba(14,15,18,0.2); transition: transform 120ms var(--ease-standard); }
  .sw.on .track { background: var(--accent); }
  .sw.on .knob { transform: translateX(14px); }
  /* Tree */
  .tree { background: var(--surface); border: 1px solid var(--border-1); border-radius: 6px; padding: 8px 12px; }
  .tree .c { padding: 4px 0; }
  .tree .indent { padding-left: 26px; }
</style>
</head>
<body class="sr-preview">
<div class="grid">
  <div class="col">
    <span class="tag">States</span>
    <label class="c"><span class="b"></span>Off</label>
    <label class="c on"><span class="b"></span>On</label>
    <label class="c mixed"><span class="b"></span>Indeterminate</label>
    <label class="c on disabled"><span class="b"></span>Disabled · on</label>
    <label class="c error"><span class="b"></span>Error<span class="sub" style="color:var(--danger)">You must accept the terms.</span></label>

    <span class="tag" style="margin-top:14px">Toggle / switch</span>
    <label class="sw on"><span class="track"><span class="knob"></span></span>Enable schema validation</label>
    <label class="sw"><span class="track"><span class="knob"></span></span>Allow breaking changes</label>
  </div>
  <div class="col">
    <span class="tag">Tree · mixed parent</span>
    <div class="tree">
      <label class="c mixed"><span class="b"></span>orders.*</label>
      <label class="c on indent"><span class="b"></span>orders.create</label>
      <label class="c on indent"><span class="b"></span>orders.update</label>
      <label class="c indent"><span class="b"></span>orders.delete</label>
      <label class="c indent"><span class="b"></span>orders.refund</label>
    </div>
    <span class="tag" style="margin-top:14px">With description</span>
    <label class="c on"><span class="b"></span><span>Sign every payload<span class="sub">Adds an HMAC header. ~0.4 ms overhead.</span></span></label>
    <label class="c"><span class="b"></span><span>Email me on failure<span class="sub">Sends to priya@northwind.dev.</span></span></label>
  </div>
</div>
</body>
</html>
