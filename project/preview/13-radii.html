<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Radii</title>
<link rel="stylesheet" href="_preview.css">
<style>
  .grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 12px; }
  .cell { display: flex; flex-direction: column; align-items: center; gap: 8px; }
  .sq { width: 76px; height: 76px; background: var(--ink); }
  .name { font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.04em; color: var(--fg-3); text-transform: uppercase; }
  .val { font-family: var(--font-mono); font-size: 12px; color: var(--fg-2); }
</style>
</head>
<body class="sr-preview">
  <div class="grid">
    <div class="cell"><div class="sq" style="border-radius:0"></div><div class="name">radius-0</div><div class="val">0px · data</div></div>
    <div class="cell"><div class="sq" style="border-radius:2px"></div><div class="name">radius-2</div><div class="val">2px · chips</div></div>
    <div class="cell"><div class="sq" style="border-radius:4px"></div><div class="name">radius-4</div><div class="val">4px · input</div></div>
    <div class="cell"><div class="sq" style="border-radius:6px"></div><div class="name">radius-6</div><div class="val">6px · sec.</div></div>
    <div class="cell"><div class="sq" style="border-radius:8px"></div><div class="name">radius-8</div><div class="val">8px · card</div></div>
    <div class="cell"><div class="sq" style="border-radius:12px"></div><div class="name">radius-12</div><div class="val">12px · modal</div></div>
  </div>
</body>
</html>
