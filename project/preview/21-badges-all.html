<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Badges — all variants</title>
<link rel="stylesheet" href="_preview.css">
<style>
  .stack { display: grid; gap: 12px; }
  .row { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; }
  .tag { font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--fg-3); width: 110px; flex-shrink: 0; }
  .b {
    display: inline-flex; align-items: center; gap: 6px;
    font-family: var(--font-mono); font-size: 11px; font-weight: 500;
    letter-spacing: 0.04em; text-transform: uppercase;
    padding: 3px 8px; border-radius: 2px; border: 1px solid;
    line-height: 1.3;
  }
  .b.solid { padding: 3px 8px; }
  .b.lg { font-size: 12px; padding: 5px 10px; }
  .b.sm { font-size: 10px; padding: 2px 6px; }
  .dot { width: 6px; height: 6px; border-radius: 50%; }
  .b--neutral { color: var(--fg-2); border-color: var(--border-1); background: var(--surface); }
  .b--ok      { color: #1F6B47; border-color: rgba(31,107,71,0.3); background: rgba(31,107,71,0.08); }
  .b--warn    { color: #8A5A14; border-color: rgba(138,90,20,0.3); background: rgba(138,90,20,0.08); }
  .b--err     { color: #9A2222; border-color: rgba(154,34,34,0.3); background: rgba(154,34,34,0.08); }
  .b--accent  { color: #1F3FE0; border-color: rgba(31,63,224,0.3); background: rgba(31,63,224,0.08); }
  .b--ink     { color: var(--paper); border-color: var(--ink); background: var(--ink); }
  .b--out     { color: var(--fg-1); border-color: var(--border-2); background: transparent; }
  .b--pill    { border-radius: 9999px; padding: 3px 10px; }
  .count { font-family: var(--font-mono); background: var(--accent); color: #fff; min-width: 18px; height: 18px; padding: 0 5px; border-radius: 9px; display: inline-flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 600; }
  .count--neutral { background: var(--graphite-15); color: var(--fg-1); }
</style>
</head>
<body class="sr-preview">
  <div class="stack">
    <div class="row"><span class="tag">Semantic</span>
      <span class="b b--ok"><span class="dot" style="background:#1F6B47"></span>deployed</span>
      <span class="b b--warn"><span class="dot" style="background:#8A5A14"></span>throttled</span>
      <span class="b b--err"><span class="dot" style="background:#9A2222"></span>failed</span>
      <span class="b b--neutral">queued</span>
      <span class="b b--accent">v2.4.1</span>
    </div>
    <div class="row"><span class="tag">Sizes</span>
      <span class="b b--ok sm">sm</span>
      <span class="b b--ok">md</span>
      <span class="b b--ok lg">lg</span>
    </div>
    <div class="row"><span class="tag">Styles</span>
      <span class="b b--ink">ink solid</span>
      <span class="b b--out">outline</span>
      <span class="b b--accent b--pill">pill</span>
      <span class="b b--ok b--pill"><span class="dot" style="background:#1F6B47"></span>live</span>
    </div>
    <div class="row"><span class="tag">Counters</span>
      <span class="count">3</span>
      <span class="count">12</span>
      <span class="count">99+</span>
      <span class="count count--neutral">0</span>
    </div>
  </div>
</body>
</html>
