<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Spacing scale</title>
<link rel="stylesheet" href="_preview.css">
<style>
  .row { display: flex; align-items: center; gap: 16px; padding: 8px 0; }
  .bar { background: var(--ink); height: 16px; border-radius: 2px; }
  .name { font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.04em; color: var(--fg-3); width: 90px; text-transform: uppercase; }
  .val { font-family: var(--font-mono); font-size: 12px; color: var(--fg-2); }
</style>
</head>
<body class="sr-preview">
  <div class="row"><span class="name">space-4</span><div class="bar" style="width:4px"></div><span class="val">4px</span></div>
  <div class="row"><span class="name">space-8</span><div class="bar" style="width:8px"></div><span class="val">8px</span></div>
  <div class="row"><span class="name">space-12</span><div class="bar" style="width:12px"></div><span class="val">12px</span></div>
  <div class="row"><span class="name">space-16</span><div class="bar" style="width:16px"></div><span class="val">16px</span></div>
  <div class="row"><span class="name">space-24</span><div class="bar" style="width:24px"></div><span class="val">24px</span></div>
  <div class="row"><span class="name">space-32</span><div class="bar" style="width:32px"></div><span class="val">32px</span></div>
  <div class="row"><span class="name">space-48</span><div class="bar" style="width:48px"></div><span class="val">48px</span></div>
  <div class="row"><span class="name">space-64</span><div class="bar" style="width:64px"></div><span class="val">64px</span></div>
  <div class="row"><span class="name">space-96</span><div class="bar" style="width:96px"></div><span class="val">96px</span></div>
  <div class="row"><span class="name">space-128</span><div class="bar" style="width:128px"></div><span class="val">128px</span></div>
</body>
</html>
