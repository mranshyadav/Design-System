<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Modal / dialog</title>
<link rel="stylesheet" href="_preview.css">
<style>
  .stage { background: var(--graphite-04); border: 1px dashed var(--border-1); border-radius: 8px; padding: 24px; min-height: 380px; display: flex; align-items: center; justify-content: center; position: relative; }
  .scrim {
    position: absolute; inset: 6px;
    background: rgba(14,15,18,0.40); border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
  }
  .modal {
    background: var(--surface);
    border: 1px solid var(--border-1);
    border-radius: 12px;
    box-shadow: var(--shadow-3);
    width: 460px; max-width: 90%;
    overflow: hidden;
  }
  .head { padding: 18px 20px 0; }
  .crumb { font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--fg-3); }
  .ttl { font-size: 18px; font-weight: 600; margin-top: 4px; }
  .desc { font-size: 13px; color: var(--fg-2); margin-top: 8px; line-height: 1.55; }
  .body { padding: 16px 20px 20px; }
  .foot {
    display: flex; justify-content: space-between; align-items: center;
    padding: 12px 20px; border-top: 1px solid var(--border-1);
    background: var(--bg-3);
  }
  .right { display: flex; gap: 8px; align-items: center; }
  .btn-ghost { background: transparent; color: var(--fg-1); border: 1px solid var(--border-1); border-radius: 4px; padding: 7px 12px; font: 500 13px var(--font-sans); cursor: pointer; }
  .btn-primary { background: var(--ink); color: var(--paper); border: 0; border-radius: 4px; padding: 7px 12px; font: 500 13px var(--font-sans); cursor: pointer; }
  .btn-danger { background: var(--danger); color: #fff; border: 0; border-radius: 4px; padding: 7px 12px; font: 500 13px var(--font-sans); cursor: pointer; }
  .x { background: transparent; border: 0; cursor: pointer; color: var(--fg-3); position: absolute; right: 12px; top: 12px; width: 28px; height: 28px; border-radius: 4px; display: inline-flex; align-items: center; justify-content: center; }
  .x:hover { background: var(--bg-3); color: var(--fg-1); }
  .field { display: flex; flex-direction: column; gap: 6px; }
  .label { font-size: 13px; font-weight: 500; color: var(--fg-2); }
  .input { background: var(--bg-3); border: 1px solid var(--border-1); border-radius: 4px; padding: 8px 10px; font: 13px var(--font-mono); color: var(--danger); }
  .hint { font-family: var(--font-mono); font-size: 11px; color: var(--fg-3); }
  .modal { position: relative; }
  .alert-ic {
    width: 36px; height: 36px; border-radius: 50%;
    background: rgba(154,34,34,0.10); color: var(--danger);
    display: inline-flex; align-items: center; justify-content: center;
    margin-bottom: 12px;
  }
  .kbd { font-family: var(--font-mono); font-size: 11px; color: var(--fg-2); background: var(--surface); border: 1px solid var(--border-1); border-radius: 3px; padding: 1px 5px; }
</style>
</head>
<body class="sr-preview">
<div class="stage">
  <div class="scrim">
    <div class="modal">
      <button class="x">×</button>
      <div class="head">
        <div class="alert-ic">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M10.3 3.86 1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><path d="M12 9v4M12 17h.01"/></svg>
        </div>
        <div class="crumb">— Destructive · Permanent</div>
        <div class="ttl">Delete pipeline <span style="font-family:var(--font-mono); font-weight:600">orders.normalize</span>?</div>
        <p class="desc">This will stop ingestion immediately and remove 12 months of audit history. Three downstream consumers depend on this pipeline.</p>
      </div>
      <div class="body">
        <div class="field">
          <span class="label">Type <span style="font-family:var(--font-mono); color:var(--danger)">orders.normalize</span> to confirm.</span>
          <input class="input" value="orders.normalize" />
          <span class="hint">This action cannot be undone.</span>
        </div>
      </div>
      <div class="foot">
        <span class="kbd">esc</span>
        <div class="right">
          <button class="btn-ghost">Cancel</button>
          <button class="btn-danger">Delete pipeline</button>
        </div>
      </div>
    </div>
  </div>
</div>
</body>
</html>
