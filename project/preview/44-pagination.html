<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Pagination</title>
<link rel="stylesheet" href="_preview.css">
<style>
  .stack { display: grid; gap: 22px; }
  .tag { font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--fg-3); display: block; margin-bottom: 8px; }
  .row { display: flex; gap: 4px; align-items: center; flex-wrap: wrap; }
  .btn {
    min-width: 32px; height: 32px; padding: 0 10px;
    border: 1px solid var(--border-1); background: var(--surface);
    border-radius: 4px; font: 500 13px var(--font-mono); color: var(--fg-1);
    display: inline-flex; align-items: center; justify-content: center; cursor: pointer;
  }
  .btn:hover { background: var(--bg-3); }
  .btn.on { background: var(--ink); color: var(--paper); border-color: var(--ink); }
  .btn.ghost { border: 0; background: transparent; }
  .btn[disabled] { opacity: 0.4; cursor: not-allowed; }
  .gap { color: var(--fg-3); padding: 0 4px; font-family: var(--font-mono); }
  .summary { display: flex; justify-content: space-between; align-items: center; }
  .summary .info { font-family: var(--font-mono); font-size: 12px; color: var(--fg-3); letter-spacing: 0.04em; }
  .seg { display: inline-flex; padding: 2px; background: var(--bg-3); border-radius: 6px; }
  .seg button { background: transparent; border: 0; padding: 5px 10px; font: 500 12px var(--font-sans); color: var(--fg-2); border-radius: 4px; cursor: pointer; }
  .seg button.on { background: var(--surface); color: var(--fg-1); box-shadow: var(--shadow-1); }
  .input { background: var(--surface); border: 1px solid var(--border-1); border-radius: 4px; padding: 0 8px; height: 28px; width: 56px; font: 13px var(--font-mono); text-align: center; }
</style>
</head>
<body class="sr-preview">
<div class="stack">
  <div>
    <span class="tag">Numbered</span>
    <div class="row">
      <button class="btn ghost" disabled>‹</button>
      <button class="btn on">1</button>
      <button class="btn">2</button>
      <button class="btn">3</button>
      <span class="gap">…</span>
      <button class="btn">12</button>
      <button class="btn">13</button>
      <button class="btn ghost">›</button>
    </div>
  </div>

  <div>
    <span class="tag">With summary & page size</span>
    <div class="summary">
      <span class="info">Showing 21 – 40 of 312 pipelines</span>
      <div class="row">
        <button class="btn ghost">‹ Prev</button>
        <button class="btn">1</button>
        <button class="btn on">2</button>
        <button class="btn">3</button>
        <span class="gap">…</span>
        <button class="btn">16</button>
        <button class="btn ghost">Next ›</button>
      </div>
      <div class="row">
        <span class="info">Rows</span>
        <div class="seg"><button>10</button><button class="on">20</button><button>50</button></div>
      </div>
    </div>
  </div>

  <div>
    <span class="tag">Cursor · jump</span>
    <div class="row">
      <button class="btn">⏮</button>
      <button class="btn">‹</button>
      <span class="info" style="padding:0 8px">Page <input class="input" value="2" /> of <span style="font-family:var(--font-mono); color:var(--fg-1)">16</span></span>
      <button class="btn">›</button>
      <button class="btn">⏭</button>
    </div>
  </div>

  <div>
    <span class="tag">Load more</span>
    <button class="btn" style="width:max-content; padding:0 16px">Load 20 more</button>
  </div>
</div>
</body>
</html>
