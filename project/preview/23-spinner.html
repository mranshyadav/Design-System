<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Spinner & loading states</title>
<link rel="stylesheet" href="_preview.css">
<style>
  .stack { display: grid; gap: 16px; }
  .row { display: flex; gap: 24px; align-items: center; }
  .tag { font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--fg-3); width: 110px; flex-shrink: 0; }
  .sp { width: 16px; height: 16px; border-radius: 50%; border: 2px solid var(--border-2); border-top-color: var(--accent); animation: spin 800ms linear infinite; }
  .sp.lg { width: 24px; height: 24px; border-width: 2.5px; }
  .sp.xl { width: 40px; height: 40px; border-width: 3px; }
  .sp.ink { border-color: var(--graphite-15); border-top-color: var(--ink); }
  @keyframes spin { to { transform: rotate(360deg); } }
  .dots { display: inline-flex; gap: 4px; }
  .dots span { width: 6px; height: 6px; border-radius: 50%; background: var(--fg-3); animation: pulse 1.2s var(--ease-standard) infinite; }
  .dots span:nth-child(2) { animation-delay: 0.15s; }
  .dots span:nth-child(3) { animation-delay: 0.30s; }
  @keyframes pulse { 0%, 80%, 100% { opacity: 0.25; } 40% { opacity: 1; } }
  .bar { width: 200px; height: 2px; background: var(--graphite-08); overflow: hidden; position: relative; border-radius: 1px; }
  .bar::after { content: ""; position: absolute; inset: 0; width: 40%; background: var(--accent); animation: slide 1.6s var(--ease-standard) infinite; }
  @keyframes slide { 0% { transform: translateX(-100%); } 100% { transform: translateX(350%); } }
  .skel { background: linear-gradient(90deg, var(--graphite-04) 0%, var(--graphite-08) 50%, var(--graphite-04) 100%); background-size: 200% 100%; animation: shimmer 1.4s ease-in-out infinite; border-radius: 4px; }
  @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
  .skel-block { display: flex; flex-direction: column; gap: 8px; flex: 1; }
  .label { font-family: var(--font-mono); font-size: 11px; color: var(--fg-3); }
  button.btn { background: var(--ink); color: var(--paper); border: 0; border-radius: 4px; padding: 8px 14px; font-size: 13px; font-weight: 500; display: inline-flex; align-items: center; gap: 8px; font-family: var(--font-sans); }
  button.btn .sp { border-color: rgba(244,241,234,0.35); border-top-color: var(--paper); }
</style>
</head>
<body class="sr-preview">
  <div class="stack">
    <div class="row"><span class="tag">Spinners</span>
      <div class="sp"></div>
      <div class="sp lg"></div>
      <div class="sp xl"></div>
      <div class="sp ink lg"></div>
      <span class="label">16 / 24 / 40 px</span>
    </div>
    <div class="row"><span class="tag">In button</span>
      <button class="btn"><span class="sp"></span>Deploying…</button>
      <button class="btn" style="background:var(--surface);color:var(--fg-1);border:1px solid var(--border-1)">
        <span class="sp ink"></span>Loading
      </button>
    </div>
    <div class="row"><span class="tag">Dots</span>
      <div class="dots"><span></span><span></span><span></span></div>
      <span class="label">Inline working indicator</span>
    </div>
    <div class="row"><span class="tag">Bar (indet.)</span>
      <div class="bar"></div>
      <span class="label">Header progress bar</span>
    </div>
    <div class="row"><span class="tag">Skeleton</span>
      <div class="skel-block" style="max-width:340px">
        <div class="skel" style="height:14px; width:60%"></div>
        <div class="skel" style="height:10px; width:90%"></div>
        <div class="skel" style="height:10px; width:75%"></div>
      </div>
    </div>
  </div>
</body>
</html>
