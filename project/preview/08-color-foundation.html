<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Foundation: ink + paper</title>
<link rel="stylesheet" href="_preview.css">
<style>
  .grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; }
  .swatch { height: 200px; border-radius: 8px; border: 1px solid var(--border-1); padding: 16px; display: flex; flex-direction: column; justify-content: space-between; }
  .swatch .name { font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.08em; text-transform: uppercase; }
  .swatch .hex { font-family: var(--font-mono); font-size: 13px; }
  .ink { background: var(--ink); color: var(--paper); }
  .ink .name, .ink .hex { color: var(--paper); }
  .paper { background: var(--paper); color: var(--ink); }
  .surface { background: var(--surface); color: var(--ink); }
</style>
</head>
<body class="sr-preview">
  <div class="grid">
    <div class="swatch ink">
      <div class="name">— ink</div>
      <div class="hex">#0E0F12</div>
    </div>
    <div class="swatch paper">
      <div class="name">— paper</div>
      <div class="hex">#F4F1EA</div>
    </div>
    <div class="swatch surface">
      <div class="name">— surface</div>
      <div class="hex">#FFFFFF</div>
    </div>
  </div>
</body>
</html>
