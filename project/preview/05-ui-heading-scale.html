<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>UI heading scale</title>
<link rel="stylesheet" href="_preview.css">
<style>
  .row { display: flex; align-items: baseline; gap: 24px; padding: 12px 0; border-bottom: 1px solid var(--border-1); }
  .row:last-child { border-bottom: 0; }
  .specimen { font-family: var(--font-sans); color: var(--fg-1); line-height: 1.1; letter-spacing: -0.01em; }
  .meta { font-family: var(--font-mono); font-size: 11px; color: var(--fg-3); letter-spacing: 0.04em; text-transform: uppercase; min-width: 110px; }
</style>
</head>
<body class="sr-preview">
  <div class="row"><span class="meta">H1 · 32 / 600</span><span class="specimen" style="font-size:32px; font-weight:600">Recent runs</span></div>
  <div class="row"><span class="meta">H2 · 24 / 600</span><span class="specimen" style="font-size:24px; font-weight:600">Configuration</span></div>
  <div class="row"><span class="meta">H3 · 20 / 600</span><span class="specimen" style="font-size:20px; font-weight:600">Sources connected</span></div>
  <div class="row"><span class="meta">H4 · 18 / 500</span><span class="specimen" style="font-size:18px; font-weight:500">Last deployment</span></div>
  <div class="row"><span class="meta">H5 · 15 / 500</span><span class="specimen" style="font-size:15px; font-weight:500">Schema version</span></div>
</body>
</html>
